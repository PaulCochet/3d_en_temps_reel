<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Scène 3D Interactive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      cursor: none;
      /* Masque le curseur par défaut */
    }

  </style>
</head>

<body>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { EffectComposer } from 'https://esm.sh/three@0.160.0/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'https://esm.sh/three@0.160.0/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'https://esm.sh/three@0.160.0/addons/postprocessing/UnrealBloomPass.js';

    // 1. La scène
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000000');

    // 2. La caméra
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 25; // Reculé pour voir tout le système
    camera.position.y = 8;  // Vue légèrement en plongée
    camera.lookAt(0, 0, 0);

    // 3. Le renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // Empêche le bug des flashs lumineux (tone mapping idéal HDR)
    document.body.appendChild(renderer.domElement);

    // ── Post-processing (Effet Glow / Bloom) ──────────────────────────────
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.85;  // Haut seuil : seules les étoiles et le soleil brillent, éliminant les flashs indésirables
    bloomPass.strength = 1.0;    // Modération du glow
    bloomPass.radius = 0.8;      // Diffusion spatiale du glow

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // ── Groupe pivot (toute la scène suit la souris) ──────────────────────
    const pivot = new THREE.Group();
    scene.add(pivot);

    // ── Le Soleil Central ─────────────────────────────────────────────────
    const sunGeo = new THREE.SphereGeometry(2, 32, 32);
    const sunMat = new THREE.MeshStandardMaterial({
      color: '#ffff00',
      emissive: '#ffaa00',
      emissiveIntensity: 4.0, // Rendu du soleil ultra lumineux
      roughness: 0.1
    });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    pivot.add(sun);

    // ── Les Planètes (Formes Géométriques) ────────────────────────────────
    const planetsData = [
      { name: "Mercure", color: '#aaaaaa', dist: 4, speed: 0.8, geo: new THREE.IcosahedronGeometry(0.4, 0) },
      { name: "Vénus", color: '#ffb300', dist: 6, speed: 0.6, geo: new THREE.TorusGeometry(0.5, 0.2, 8, 16) },
      { name: "Terre", color: '#0088ff', dist: 8.5, speed: 0.5, geo: new THREE.BoxGeometry(0.9, 0.9, 0.9) },
      { name: "Mars", color: '#ff3300', dist: 11, speed: 0.4, geo: new THREE.TetrahedronGeometry(0.7, 0) },
      { name: "Jupiter", color: '#e6a15c', dist: 14.5, speed: 0.2, geo: new THREE.DodecahedronGeometry(1.4, 0) },
      { name: "Saturne", color: '#f0e6a8', dist: 18, speed: 0.15, geo: new THREE.SphereGeometry(1.2, 16, 16) }, // + Anneau !
      { name: "Uranus", color: '#00e5ff', dist: 22, speed: 0.1, geo: new THREE.CylinderGeometry(0.6, 0.6, 1.5, 8) },
      { name: "Neptune", color: '#2962ff', dist: 26, speed: 0.08, geo: new THREE.OctahedronGeometry(1, 0) }
    ];

    const planets = [];

    planetsData.forEach((data, index) => {
      const mat = new THREE.MeshPhysicalMaterial({
        color: data.color,
        emissive: data.color,
        emissiveIntensity: 0.3, // Brillance lumineuse interne
        roughness: 0.1,
        metalness: 0.8,
        clearcoat: 1.0, // Effet de vernis très brillant
        clearcoatRoughness: 0.1
      });
      const mesh = new THREE.Mesh(data.geo, mat);

      // Anneau de Saturne (index 5)
      if (index === 5) {
        const ringGeo = new THREE.TorusGeometry(2.2, 0.2, 8, 32);
        const ringMat = new THREE.MeshPhysicalMaterial({
          color: '#f0e6a8',
          emissive: '#f0e6a8',
          emissiveIntensity: 0.2,
          metalness: 0.8,
          roughness: 0.1,
          clearcoat: 1.0
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.5;
        mesh.add(ring);
      }

      pivot.add(mesh);

      planets.push({
        mesh: mesh,
        dist: data.dist,
        speed: data.speed,
        angle: Math.random() * Math.PI * 2, // angle de départ aléatoire
        baseY: (Math.random() - 0.5) * 2,   // légère déclinaison orbitale
        hoverOffset: new THREE.Vector3(0, 0, 0), // décalage actuel (physique)
        targetHoverOffset: new THREE.Vector3(0, 0, 0), // décalage cible
        rotSpeed: new THREE.Vector3(Math.random() * 0.02, Math.random() * 0.02, Math.random() * 0.02)
      });
    });

    // ── Petites sphères d'ambiance (champ d'étoiles) ──────────────────────
    const particles = [];
    for (let i = 0; i < 200; i++) {
      const sg = new THREE.SphereGeometry(0.05 + Math.random() * 0.05, 8, 8);
      const starColor = new THREE.Color().setHSL(Math.random(), 0.8, 0.8);
      const sm = new THREE.MeshPhysicalMaterial({
        color: starColor,
        emissive: starColor,
        emissiveIntensity: 2.0, // Étoiles auto-lumineuses et brillantes
        metalness: 1.0,
        roughness: 0.0,
        clearcoat: 1.0
      });
      const s = new THREE.Mesh(sg, sm);
      s.position.set(
        (Math.random() - 0.5) * 80,
        (Math.random() - 0.5) * 40,
        (Math.random() - 0.5) * 80
      );
      pivot.add(s);
      particles.push({ mesh: s, offset: Math.random() * Math.PI * 2 });
    }

    // ── Lumières ──────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight('#ffffff', 0.8)); // Fond plus lumineux

    // Lumière ponctuelle issue du soleil (boostée)
    const sunLight = new THREE.PointLight('#ffffff', 50, 150); // Blanc très intense
    pivot.add(sunLight);

    // Lumière d'appoint directionnelle pour faire briller les matériaux (effet clearcoat)
    const fillLight = new THREE.DirectionalLight('#ffffff', 2.0);
    fillLight.position.set(10, 20, 10);
    scene.add(fillLight);


    // ── Curseur Fusée (Fusée Low Poly 3D) ─────────────────────────────────
    const rocketContainer = new THREE.Group();
    const rocket = new THREE.Group();

    // Corps de la fusée (Blanc)
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: '#ffffff', roughness: 0.5 });
    const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
    rocket.add(bodyMesh);

    // Nez de la fusée (Rouge/Rose)
    const noseGeo = new THREE.ConeGeometry(0.3, 0.6, 8);
    const noseMat = new THREE.MeshStandardMaterial({ color: '#ff0055', roughness: 0.3, metalness: 0.5 });
    const noseMesh = new THREE.Mesh(noseGeo, noseMat);
    noseMesh.position.y = 0.9;
    rocket.add(noseMesh);

    // Ailerons géométriques
    const finGeo = new THREE.BoxGeometry(0.1, 0.4, 0.4);
    const finMat = new THREE.MeshStandardMaterial({ color: '#ff0055', roughness: 0.5 });
    const fin1 = new THREE.Mesh(finGeo, finMat); fin1.position.set(0.3, -0.4, 0);
    const fin2 = new THREE.Mesh(finGeo, finMat); fin2.position.set(-0.3, -0.4, 0);
    const fin3 = new THREE.Mesh(finGeo, finMat); fin3.position.set(0, -0.4, 0.3); fin3.rotation.y = Math.PI / 2;
    const fin4 = new THREE.Mesh(finGeo, finMat); fin4.position.set(0, -0.4, -0.3); fin4.rotation.y = Math.PI / 2;
    rocket.add(fin1, fin2, fin3, fin4);

    // Aligner le "nez" de la fusée (+Y) avec l'axe avant (-Z) de son conteneur
    rocket.rotation.x = -Math.PI / 2;
    rocketContainer.add(rocket);
    scene.add(rocketContainer);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(-10, -10); // par défaut en dehors
    const targetRocketPos = new THREE.Vector3();

    let mouseX = 0;
    let mouseY = 0;
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;   
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;  

      pointer.x = mouseX;
      pointer.y = -mouseY;
    });

    // ── Boucle d'animation ────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // ── Interaction Raycaster
      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));

      // ── Calcul des orbites et physique élastique
      planets.forEach((p) => {
        p.angle += p.speed * 0.01; // Avancement orbital

        // Orbite mathématique propre
        const idealX = Math.cos(p.angle) * p.dist;
        const idealZ = Math.sin(p.angle) * p.dist;
        const idealY = p.baseY + Math.sin(t * p.speed + p.angle) * 1.5;

        // La planète (ou son anneau) est-elle survolée ?
        const isHovered = intersects.length > 0 && (intersects[0].object === p.mesh || intersects[0].object.parent === p.mesh);

        if (isHovered) {
          // Si survolée, on calcule un vecteur qui l'éloigne du centre
          const pushDir = new THREE.Vector3(idealX, idealY, idealZ).normalize();
          p.targetHoverOffset.copy(pushDir.multiplyScalar(4.0)); // Force du "repoussoir"
        } else {
          // Sinon, l'objectif est de revenir à la position par défaut (0,0,0)
          p.targetHoverOffset.set(0, 0, 0);
        }

        // Lerp (ressort) de l'offset élastique vers la cible
        p.hoverOffset.lerp(p.targetHoverOffset, 0.07);

        // Position finale appliquée
        p.mesh.position.set(
          idealX + p.hoverOffset.x,
          idealY + p.hoverOffset.y,
          idealZ + p.hoverOffset.z
        );

        // Rotation de l'objet sur lui-même
        p.mesh.rotation.x += p.rotSpeed.x;
        p.mesh.rotation.y += p.rotSpeed.y;
        p.mesh.rotation.z += p.rotSpeed.z;
      });

      // Le pivot suit la souris en douceur (inclinaison de toute la scène)
      pivot.rotation.y += (mouseX * 0.7 - pivot.rotation.y) * 0.05;
      pivot.rotation.x += (mouseY * 0.45 - pivot.rotation.x) * 0.05;

      // Petites sphères : léger flottement
      particles.forEach(({ mesh, offset }) => {
        mesh.position.y += Math.sin(t + offset) * 0.003;
      });

      // ── Mouvement de la Fusée Curseur ──────────────────────────────
      // On convertit le pointeur 2D en position 3D exacte devant la caméra (même inclinée)
      const vector = new THREE.Vector3(pointer.x, pointer.y, 0.5);
      vector.unproject(camera);
      vector.sub(camera.position).normalize();
      const distanceToCamera = 8; // La fusée vole à 8 unités devant l'objectif
      
      targetRocketPos.copy(camera.position).add(vector.multiplyScalar(distanceToCamera));
      
      // La fusée suit doucement le vrai pointeur (lerp spatial)
      rocketContainer.position.lerp(targetRocketPos, 0.2);
      
      // La fusée "regarde" constamment en direction de la Terre (planète 2)
      const earthWorldPos = new THREE.Vector3();
      planets[2].mesh.getWorldPosition(earthWorldPos);
      rocketContainer.lookAt(earthWorldPos);

      // Rendu avec le post-processing (glow effect) puiisqu'on n'utilise plus renderer.render
      composer.render();
    }
    animate();

    // ── Responsive ────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
