<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Scène 3D Interactive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
      cursor: none;
      /* Masque le curseur par défaut */
    }

    #custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 20px;
      height: 20px;
      border: 2px solid #00e5ff;
      /* Cyan assorti à la scène */
      background: rgba(0, 229, 255, 0.15);
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.8), inset 0 0 6px rgba(0, 229, 255, 0.5);
      pointer-events: none;
      /* Ne bloque pas le clic */
      z-index: 10000;
      will-change: transform;
      mix-blend-mode: screen;
      opacity: 0;
      /* Caché jusqu'à ce que la souris bouge */
      transition: opacity 0.3s ease;
    }
  </style>
</head>

<body>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';

    // 1. La scène
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#000000');

    // 2. La caméra
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 25; // Reculé pour voir tout le système
    camera.position.y = 8;  // Vue légèrement en plongée
    camera.lookAt(0, 0, 0);

    // 3. Le renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // ── Groupe pivot (toute la scène suit la souris) ──────────────────────
    const pivot = new THREE.Group();
    scene.add(pivot);

    // ── Le Soleil Central ─────────────────────────────────────────────────
    const sunGeo = new THREE.SphereGeometry(2, 32, 32);
    const sunMat = new THREE.MeshStandardMaterial({
      color: '#ffff00',
      emissive: '#ffaa00',
      emissiveIntensity: 4.0, // Rendu du soleil ultra lumineux
      roughness: 0.1
    });
    const sun = new THREE.Mesh(sunGeo, sunMat);
    pivot.add(sun);

    // ── Les Planètes (Formes Géométriques) ────────────────────────────────
    const planetsData = [
      { name: "Mercure", color: '#aaaaaa', dist: 4, speed: 0.8, geo: new THREE.IcosahedronGeometry(0.4, 0) },
      { name: "Vénus", color: '#ffb300', dist: 6, speed: 0.6, geo: new THREE.TorusGeometry(0.5, 0.2, 8, 16) },
      { name: "Terre", color: '#0088ff', dist: 8.5, speed: 0.5, geo: new THREE.BoxGeometry(0.9, 0.9, 0.9) },
      { name: "Mars", color: '#ff3300', dist: 11, speed: 0.4, geo: new THREE.TetrahedronGeometry(0.7, 0) },
      { name: "Jupiter", color: '#e6a15c', dist: 14.5, speed: 0.2, geo: new THREE.DodecahedronGeometry(1.4, 0) },
      { name: "Saturne", color: '#f0e6a8', dist: 18, speed: 0.15, geo: new THREE.SphereGeometry(1.2, 16, 16) }, // + Anneau !
      { name: "Uranus", color: '#00e5ff', dist: 22, speed: 0.1, geo: new THREE.CylinderGeometry(0.6, 0.6, 1.5, 8) },
      { name: "Neptune", color: '#2962ff', dist: 26, speed: 0.08, geo: new THREE.OctahedronGeometry(1, 0) }
    ];

    const planets = [];

    planetsData.forEach((data, index) => {
      const mat = new THREE.MeshPhysicalMaterial({
        color: data.color,
        emissive: data.color,
        emissiveIntensity: 0.3, // Brillance lumineuse interne
        roughness: 0.1,
        metalness: 0.8,
        clearcoat: 1.0, // Effet de vernis très brillant
        clearcoatRoughness: 0.1
      });
      const mesh = new THREE.Mesh(data.geo, mat);

      // Anneau de Saturne (index 5)
      if (index === 5) {
        const ringGeo = new THREE.TorusGeometry(2.2, 0.2, 8, 32);
        const ringMat = new THREE.MeshPhysicalMaterial({
          color: '#f0e6a8',
          emissive: '#f0e6a8',
          emissiveIntensity: 0.2,
          metalness: 0.8,
          roughness: 0.1,
          clearcoat: 1.0
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.5;
        mesh.add(ring);
      }

      pivot.add(mesh);

      planets.push({
        mesh: mesh,
        dist: data.dist,
        speed: data.speed,
        angle: Math.random() * Math.PI * 2, // angle de départ aléatoire
        baseY: (Math.random() - 0.5) * 2,   // légère déclinaison orbitale
        hoverOffset: new THREE.Vector3(0, 0, 0), // décalage actuel (physique)
        targetHoverOffset: new THREE.Vector3(0, 0, 0), // décalage cible
        rotSpeed: new THREE.Vector3(Math.random() * 0.02, Math.random() * 0.02, Math.random() * 0.02)
      });
    });

    // ── Petites sphères d'ambiance (champ d'étoiles) ──────────────────────
    const particles = [];
    for (let i = 0; i < 200; i++) {
      const sg = new THREE.SphereGeometry(0.05 + Math.random() * 0.05, 8, 8);
      const starColor = new THREE.Color().setHSL(Math.random(), 0.8, 0.8);
      const sm = new THREE.MeshPhysicalMaterial({
        color: starColor,
        emissive: starColor,
        emissiveIntensity: 2.0, // Étoiles auto-lumineuses et brillantes
        metalness: 1.0,
        roughness: 0.0,
        clearcoat: 1.0
      });
      const s = new THREE.Mesh(sg, sm);
      s.position.set(
        (Math.random() - 0.5) * 80,
        (Math.random() - 0.5) * 40,
        (Math.random() - 0.5) * 80
      );
      pivot.add(s);
      particles.push({ mesh: s, offset: Math.random() * Math.PI * 2 });
    }

    // ── Lumières ──────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight('#ffffff', 0.8)); // Fond plus lumineux

    // Lumière ponctuelle issue du soleil (boostée)
    const sunLight = new THREE.PointLight('#ffffff', 50, 150); // Blanc très intense
    pivot.add(sunLight);

    // Lumière d'appoint directionnelle pour faire briller les matériaux (effet clearcoat)
    const fillLight = new THREE.DirectionalLight('#ffffff', 2.0);
    fillLight.position.set(10, 20, 10);
    scene.add(fillLight);


    // ── Interaction souris & Curseur personnalisé ─────────────────────────
    const cursor = document.createElement('div');
    cursor.id = 'custom-cursor';
    document.body.appendChild(cursor);

    let targetCursorX = window.innerWidth / 2;
    let targetCursorY = window.innerHeight / 2;
    let currentCursorX = targetCursorX;
    let currentCursorY = targetCursorY;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(-10, -10); // par défaut en dehors de l'écran

    let mouseX = 0;
    let mouseY = 0;
    window.addEventListener('mousemove', (e) => {
      cursor.style.opacity = '1'; // Affiche le curseur dès qu'on bouge
      targetCursorX = e.clientX;
      targetCursorY = e.clientY;
      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;   // -1 à 1
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;  // -1 à 1

      // Mise à jour du raycaster
      pointer.x = mouseX;
      pointer.y = -mouseY;
    });

    // ── Boucle d'animation ────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // ── Interaction Raycaster
      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));

      // ── Calcul des orbites et physique élastique
      planets.forEach((p) => {
        p.angle += p.speed * 0.01; // Avancement orbital

        // Orbite mathématique propre
        const idealX = Math.cos(p.angle) * p.dist;
        const idealZ = Math.sin(p.angle) * p.dist;
        const idealY = p.baseY + Math.sin(t * p.speed + p.angle) * 1.5;

        // La planète (ou son anneau) est-elle survolée ?
        const isHovered = intersects.length > 0 && (intersects[0].object === p.mesh || intersects[0].object.parent === p.mesh);

        if (isHovered) {
          // Si survolée, on calcule un vecteur qui l'éloigne du centre
          const pushDir = new THREE.Vector3(idealX, idealY, idealZ).normalize();
          p.targetHoverOffset.copy(pushDir.multiplyScalar(4.0)); // Force du "repoussoir"
        } else {
          // Sinon, l'objectif est de revenir à la position par défaut (0,0,0)
          p.targetHoverOffset.set(0, 0, 0);
        }

        // Lerp (ressort) de l'offset élastique vers la cible
        p.hoverOffset.lerp(p.targetHoverOffset, 0.07);

        // Position finale appliquée
        p.mesh.position.set(
          idealX + p.hoverOffset.x,
          idealY + p.hoverOffset.y,
          idealZ + p.hoverOffset.z
        );

        // Rotation de l'objet sur lui-même
        p.mesh.rotation.x += p.rotSpeed.x;
        p.mesh.rotation.y += p.rotSpeed.y;
        p.mesh.rotation.z += p.rotSpeed.z;
      });

      // Le pivot suit la souris en douceur (inclinaison de toute la scène)
      pivot.rotation.y += (mouseX * 0.7 - pivot.rotation.y) * 0.05;
      pivot.rotation.x += (mouseY * 0.45 - pivot.rotation.x) * 0.05;

      // Petites sphères : léger flottement
      particles.forEach(({ mesh, offset }) => {
        mesh.position.y += Math.sin(t + offset) * 0.003;
      });

      // Animation fluide du curseur personnalisé (approche + rotation)
      currentCursorX += (targetCursorX - currentCursorX) * 0.35; // fluidité
      currentCursorY += (targetCursorY - currentCursorY) * 0.35;
      cursor.style.transform = `translate(${currentCursorX - 10}px, ${currentCursorY - 10}px) rotate(${t * 90}deg)`;

      renderer.render(scene, camera);
    }
    animate();

    // ── Responsive ────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
