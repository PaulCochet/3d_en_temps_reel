<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Scène 3D Interactive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';

    // 1. La scène
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    // 2. La caméra
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 10;

    // 3. Le renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // ── Groupe pivot (toute la scène suit la souris) ──────────────────────
    const pivot = new THREE.Group();
    scene.add(pivot);

    // ── Objet 1 : TorusKnot central (magenta métallique) ─────────────────
    const knotGeo = new THREE.TorusKnotGeometry(2, 0.45, 128, 16);
    const knotMat = new THREE.MeshStandardMaterial({ color: '#e040fb', roughness: 0.2, metalness: 0.8 });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    pivot.add(knot);

    // ── Objet 2 : Sphère (cyan) ───────────────────────────────────────────
    const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
    const sphereMat = new THREE.MeshStandardMaterial({ color: '#00e5ff', roughness: 0.15, metalness: 0.9 });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.set(-5, 2, 0);
    pivot.add(sphere);

    // ── Objet 3 : Torus / anneau (jaune doré) ────────────────────────────
    const torusGeo = new THREE.TorusGeometry(1.3, 0.4, 20, 60);
    const torusMat = new THREE.MeshStandardMaterial({ color: '#ffea00', roughness: 0.3, metalness: 0.6 });
    const torus = new THREE.Mesh(torusGeo, torusMat);
    torus.position.set(5, -1, 0);
    pivot.add(torus);

    // ── Objet 4 : Cône (orange) ───────────────────────────────────────────
    const coneGeo = new THREE.ConeGeometry(1, 2.5, 32);
    const coneMat = new THREE.MeshStandardMaterial({ color: '#ff6d00', roughness: 0.4, metalness: 0.4 });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.set(0, -4.5, 1.5);
    pivot.add(cone);

    // ── Petites sphères d'ambiance ────────────────────────────────────────
    const particles = [];
    for (let i = 0; i < 35; i++) {
      const sg = new THREE.SphereGeometry(0.07 + Math.random() * 0.1, 8, 8);
      const sm = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(Math.random(), 0.9, 0.65),
        roughness: 0.2,
        metalness: 0.5
      });
      const s = new THREE.Mesh(sg, sm);
      s.position.set(
        (Math.random() - 0.5) * 22,
        (Math.random() - 0.5) * 14,
        (Math.random() - 0.5) * 8 - 3
      );
      pivot.add(s);
      particles.push({ mesh: s, offset: Math.random() * Math.PI * 2 });
    }

    // ── Lumières ──────────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight('#ffffff', 0.35));

    // Lumière magenta qui orbite
    const light1 = new THREE.PointLight('#e040fb', 8, 22);
    light1.position.set(3, 3, 6);
    scene.add(light1);

    // Lumière cyan qui orbite en opposition
    const light2 = new THREE.PointLight('#00e5ff', 6, 22);
    light2.position.set(-4, -2, 6);
    scene.add(light2);

    // Lumière directionnelle douce
    const dirLight = new THREE.DirectionalLight('#ffffff', 0.8);
    dirLight.position.set(2, 5, 4);
    scene.add(dirLight);

    // ── Interaction souris ────────────────────────────────────────────────
    let mouseX = 0;
    let mouseY = 0;
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 2;   // -1 à 1
      mouseY = (e.clientY / window.innerHeight - 0.5) * 2;  // -1 à 1
    });

    // ── Boucle d'animation ────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // TorusKnot : rotation propre
      knot.rotation.y = t * 0.35;
      knot.rotation.x = t * 0.18;

      // Sphère : flottement + rotation
      sphere.position.x = -5 + Math.sin(t * 0.7) * 0.6;
      sphere.position.y =  2 + Math.cos(t * 0.5) * 0.6;
      sphere.rotation.y = t * 0.5;

      // Torus : rotation et flottement vertical
      torus.rotation.x = t * 0.55;
      torus.rotation.z = t * 0.25;
      torus.position.y = -1 + Math.sin(t * 0.65) * 0.5;

      // Cône : rotation lente + tangage
      cone.rotation.y = t * 0.4;
      cone.position.x = Math.sin(t * 0.45) * 0.8;

      // Lumières qui orbitent autour de la scène
      light1.position.x = Math.cos(t * 0.5) * 6;
      light1.position.y = Math.sin(t * 0.7) * 5;
      light2.position.x = Math.cos(t * 0.4 + Math.PI) * 6;
      light2.position.y = Math.sin(t * 0.6 + Math.PI) * 5;

      // Le pivot suit la souris en douceur (inclinaison de toute la scène)
      pivot.rotation.y += (mouseX * 0.7 - pivot.rotation.y) * 0.05;
      pivot.rotation.x += (mouseY * 0.45 - pivot.rotation.x) * 0.05;

      // Petites sphères : léger flottement
      particles.forEach(({ mesh, offset }) => {
        mesh.position.y += Math.sin(t + offset) * 0.003;
      });

      renderer.render(scene, camera);
    }
    animate();

    // ── Responsive ────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>

</html>
